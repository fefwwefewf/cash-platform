<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CASHVIEW TERMINAL</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #0e0e0e; color: #ffffff; margin: 0; padding: 15px; }
        .balance-card { background: #1a1a1a; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .balance-amount { font-size: 36px; font-weight: bold; color: #4caf50; margin-top: 10px; }
        .task-card { background: #1a1a1a; border-radius: 18px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .task-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .task-reward { color: #4caf50; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #333 !important; color: #777 !important; cursor: not-allowed; }
        #video-container { display: none; margin-bottom: 15px; border-radius: 12px; overflow: hidden; }
        #withdraw-section { display: none; background: #1a1a1a; padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px solid #333; }
        .method { background: #252525; padding: 12px; margin: 8px 0; border-radius: 10px; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div style="font-size: 14px; color: #aaa;">ВАШ БАЛАНС</div>
        <div class="balance-amount">$<span id="user-balance">0.00</span></div>
        <button class="btn" style="margin-top:15px; background:#222; font-size: 14px;" onclick="showWithdraw()">ВЫВЕСТИ ДЕНЬГИ 💳</button>
    </div>

    <!-- РАЗОВОЕ ЗАДАНИЕ С ЛАЙКОМ В ТВОЙ КАНАЛ -->
    <div class="task-card" id="like-task-block">
        <div class="task-title">👍 Поставить лайк на пост</div>
        <div class="task-reward">+$1.50</div>
        <button id="like-btn" class="btn" onclick="startLikeTask('https://t.me/CashView22')">Выполнить</button>
    </div>

    <div class="task-card">
        <div class="task-title">📺 Просмотр видео-рекламы</div>
        <div class="task-reward">+$7.50</div>
        <div id="video-container">
            <iframe id="ad-video" width="100%" height="200" src="" frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        <button id="video-btn" class="btn" onclick="playRealVideo()">Смотреть видео (30 сек)</button>
    </div>

    <div id="withdraw-section">
        <h3 style="margin-top: 0;">Выберите способ:</h3>
        <div class="method">💳 Банковская карта (РФ/СНГ)</div>
        <div class="method">🪙 Crypto (USDT TRC-20)</div>
        <button class="btn" style="margin-top:15px; background:#4caf50;" onclick="finalWithdraw()">ПОДТВЕРДИТЬ ВЫВОД</button>
    </div>

    <script>
        let balance = 0;
        let likeDone = false;

        function loadData() {
            const savedBalance = localStorage.getItem('user_balance');
            const savedLike = localStorage.getItem('like_task_done');
            const lastVisit = localStorage.getItem('last_visit');
            const now = new Date().getTime();

            if (lastVisit && (now - lastVisit > 20 * 60 * 60 * 1000)) {
                localStorage.clear();
                balance = 0;
                likeDone = false;
            } else {
                if (savedBalance) balance = parseFloat(savedBalance);
                if (savedLike === 'true') {
                    likeDone = true;
                    setLikeButtonDone();
                }
            }
            document.getElementById('user-balance').innerText = balance.toFixed(2);
            localStorage.setItem('last_visit', now);
        }

        function startLikeTask(url) {
            window.open(url, '_blank');
            const btn = document.getElementById('like-btn');
            btn.innerText = "ПОДТВЕРДИТЬ ВЫПОЛНЕНИЕ";
            btn.style.background = "#fb8c00";
            btn.onclick = finishLikeTask;
        }

        function finishLikeTask() {
            balance += 1.50;
            likeDone = true;
            document.getElementById('user-balance').innerText = balance.toFixed(2);
            localStorage.setItem('user_balance', balance);
            localStorage.setItem('like_task_done', 'true');
            setLikeButtonDone();
        }

        function setLikeButtonDone() {
            const btn = document.getElementById('like-btn');
            btn.innerText = "✅ ВЫПОЛНЕНО";
            btn.disabled = true;
            btn.style.background = "#333";
        }

        function playRealVideo() {
            const btn = document.getElementById('video-btn');
            const container = document.getElementById('video-container');
            const iframe = document.getElementById('ad-video');
            iframe.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"; 
            container.style.display = 'block';
            btn.disabled = true;
            let timeLeft = 30;
            let timer = setInterval(() => {
                btn.innerText = `СМОТРИМ... ${timeLeft}с`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    container.style.display = 'none';
                    iframe.src = "";
                    balance += 7.50;
                    document.getElementById('user-balance').innerText = balance.toFixed(2);
                    localStorage.setItem('user_balance', balance);
                    btn.disabled = false;
                    btn.innerText = "СМОТРЕТЬ СНОВА (+$7.50)";
                }
                timeLeft--;
            }, 1000);
        }

        function showWithdraw() { document.getElementById('withdraw-section').style.display = 'block'; }

        function finalWithdraw() {
            if (balance < 50) alert("Ошибка! Нужно минимум $50.00.");
            else alert("Для вывода пригласите 15 друзей!");
        }

        loadData();
    </script>
</body>
</html>
