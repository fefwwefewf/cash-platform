<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CASHVIEW TERMINAL</title>
    <style>
        body { font-family: sans-serif; background-color: #0e0e0e; color: #ffffff; margin: 0; padding: 15px; }
        .balance-card { background: #1a1a1a; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .balance-amount { font-size: 36px; font-weight: bold; color: #4caf50; margin-top: 10px; }
        .task-card { background: #1a1a1a; border-radius: 18px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .task-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .task-reward { color: #4caf50; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #video-container { display: none; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div style="font-size: 14px; color: #aaa;">ВАШ БАЛАНС</div>
        <div class="balance-amount">$<span id="user-balance">0.00</span></div>
    </div>

    <!-- ЗАДАНИЕ С ПЕРЕХОДОМ ПО ССЫЛКЕ -->
    <div class="task-card">
        <div class="task-title">👍 Поставить лайк на пост</div>
        <div class="task-reward">+$1.50</div>
        <button id="like-btn-1" class="btn" onclick="openTaskLink('https://t.me/ССЫЛКА_НА_ПОСТ', 1.5, this)">Выполнить</button>
    </div>

    <div class="task-card">
        <div class="task-title">📺 Просмотр видео-рекламы</div>
        <div class="task-reward">+$7.50</div>
        <div id="video-container">
            <iframe id="ad-video" width="100%" height="200" src="" frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        <button id="video-btn" class="btn" onclick="playRealVideo()">Смотреть видео (30 сек)</button>
    </div>

    <script>
        let balance = 0;

        // Функция для лайков: открывает ссылку и начисляет баланс
        function openTaskLink(url, amount, btn) {
            window.open(url, '_blank'); // Открываем пост в новой вкладке
            
            // Меняем кнопку, чтобы человек подтвердил выполнение
            btn.innerText = "ПОДТВЕРДИТЬ ВЫПОЛНЕНИЕ";
            btn.style.background = "#fb8c00";
            btn.onclick = function() {
                balance += amount;
                document.getElementById('user-balance').innerText = balance.toFixed(2);
                btn.innerText = "✅ ВЫПОЛНЕНО";
                btn.disabled = true;
                btn.style.background = "#444";
            };
        }

        function playRealVideo() {
            const btn = document.getElementById('video-btn');
            const container = document.getElementById('video-container');
            const iframe = document.getElementById('ad-video');
            
            iframe.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0"; 
            container.style.display = 'block';
            btn.disabled = true;

            let timeLeft = 30;
            let timer = setInterval(() => {
                btn.innerText = `СМОТРИМ РЕКЛАМУ... ${timeLeft}с`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    container.style.display = 'none';
                    iframe.src = "";
                    
                    balance += 7.50;
                    document.getElementById('user-balance').innerText = balance.toFixed(2);
                    
                    // Делаем кнопку снова активной для повторного просмотра!
                    btn.disabled = false;
                    btn.innerText = "СМОТРЕТЬ СНОВА (+$7.50)";
                    btn.style.background = "#0088cc";
                }
                timeLeft--;
            }, 1000);
        }
    </script>
</body>
</html>
