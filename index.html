<!-- Секция с видео (вставь это вместо старой карточки с видео) -->
<div class="task-card">
    <div class="task-title">📺 Просмотр видео-рекламы</div>
    <div class="task-reward">Награда: $7.50</div>
    
    <!-- Само видео (скрыто по умолчанию) -->
    <div id="video-container" style="display:none; margin-bottom:10px;">
        <iframe id="ad-video" width="100%" height="200" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <button id="video-btn" class="btn" onclick="playRealVideo()">Смотреть видео (30 сек)</button>
</div>

<script>
    let balance = 0; // Это твой текущий баланс

    function playRealVideo() {
        const btn = document.getElementById('video-btn');
        const container = document.getElementById('video-container');
        const iframe = document.getElementById('ad-video');
        
        // Ссылка на любое рекламное видео с YouTube (параметр autoplay=1 запустит его сразу)
        // Можно заменить на свою ссылку
        iframe.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0"; 
        
        container.style.display = 'block';
        btn.disabled = true;

        let timeLeft = 30;
        let timer = setInterval(() => {
            btn.innerText = `Смотрим рекламу... ${timeLeft}с`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                container.style.display = 'none';
                iframe.src = ""; // Выключаем видео
                
                // Начисляем деньги
                balance += 7.50;
                document.getElementById('user-balance').innerText = balance.toFixed(2);
                
                btn.innerText = "✅ Начислено +$7.50";
                btn.style.background = "#4caf50";
            }
            timeLeft--;
        }, 1000);
    }
</script>
